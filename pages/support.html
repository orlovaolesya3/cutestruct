<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Немного добрых слов</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* === ФОТОАППАРАТ === */
        .camera-wrapper {
            position: fixed;
            bottom: 5vh;
            left: 8%;
            width: min(320px, 35vw);
            max-width: 35vw;
            z-index: 200;
            cursor: pointer;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.25));
        }
        .camera {
            position: relative;
            width: 100%;
            transition: transform 0.1s ease;
        }
        .camera:active {
            transform: scale(0.97);
        }
        .camera img {
            width: 100%;
            height: auto;
            display: block;
            pointer-events: auto;
        }

        /* === ВЕРТИКАЛЬНАЯ ПОДСКАЗКА === */
        .hint {
            position: fixed;
            bottom: 30vh;
            left: calc(8% + min(320px, 35vw) + 2vw);
            writing-mode: vertical-rl;
            text-orientation: mixed;
            font-size: clamp(10px, 2.5vw, 14px);
            font-weight: 500;
            color: #888;
            white-space: nowrap;
            z-index: 100;
            pointer-events: none;
        }
        body.dark-theme .hint {
            color: #aaa;
        }

        /* === МЕСТО ДЛЯ ПОСЛЕДНЕЙ ФОТОГРАФИИ (чуть меньше) === */
        .photo-stack {
            position: fixed;
            bottom: 58vh;
            left: calc(8% + min(320px, 35vw) * 0.14);
            width: calc(min(320px, 35vw) * 0.72);
            z-index: 150;
            pointer-events: none;
        }

        .last-photo {
            background: white;
            padding: 6px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
            text-align: center;
            width: 100%;
            opacity: 1;
        }
        .last-photo img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            display: block;
            margin-bottom: 4px;
        }
        .last-photo p {
            font-size: clamp(10px, 2vw, 12px);
            font-weight: 500;
            margin: 0;
            padding: 2px 0;
            color: #333;
        }
        body.dark-theme .last-photo {
            background: white;
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }
        body.dark-theme .last-photo p {
            color: #333;
        }

        /* === АНИМАЦИЯ ВЫЕЗДА (чуть меньше) === */
        .animated-photo-container {
            position: fixed;
            bottom: 5vh;
            left: calc(8% + min(320px, 35vw) * 0.14);
            width: calc(min(320px, 35vw) * 0.72);
            z-index: 180;
            pointer-events: none;
        }

        .anim-photo {
            background: white;
            padding: 6px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
            opacity: 0;
            transform: translateY(0);
        }
        .anim-photo.animate {
            animation: liftUp 1.4s cubic-bezier(0.2, 0.85, 0.3, 1) forwards;
        }
        @keyframes liftUp {
            0% {
                opacity: 0;
                transform: translateY(0);
            }
            20% {
                opacity: 1;
                transform: translateY(-10vh);
            }
            60% {
                opacity: 1;
                transform: translateY(-35vh);
            }
            100% {
                opacity: 1;
                transform: translateY(-55vh);
            }
        }
        .anim-photo img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            display: block;
            margin-bottom: 4px;
        }
        .anim-photo p {
            font-size: clamp(10px, 2vw, 13px);
            font-weight: 500;
            margin: 0;
            padding: 2px 0;
            color: #333;
        }
        body.dark-theme .anim-photo {
            background: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }
        body.dark-theme .anim-photo p {
            color: #333;
        }

        /* === ВСПЫШКА === */
        .flash-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 1000;
            transition: opacity 0.12s ease-out;
        }

        /* === ОСНОВНОЙ КОНТЕНТ === */
        .right-content {
            position: relative;
            width: 45%;
            margin-left: 55%;
            padding: 2%;
            padding-bottom: 75vh;
        }
        @media (max-width: 768px) {
            .right-content {
                width: 85%;
                margin-left: 10%;
                text-align: center;
                padding-bottom: 80vh;
            }
        }

        .back-btn {
            display: inline-block;
            text-decoration: none;
            margin-bottom: 20px;
            padding: 8px 16px;
            border-radius: 8px;
            transition: background 0.3s;
            font-weight: 500;
            font-size: clamp(12px, 2vw, 14px);
        }
        body.light-theme .back-btn {
            background: rgba(171, 205, 239, 0.8);
            color: #333;
        }
        body.light-theme .back-btn:hover {
            background: rgba(171, 205, 239, 1);
        }
        body.dark-theme .back-btn {
            background: rgba(74, 74, 255, 0.8);
            color: #fff;
        }
        body.dark-theme .back-btn:hover {
            background: #4a4aff;
        }

        .right-content header {
            text-align: left;
            margin-bottom: 30px;
        }
        .right-content h1 {
            font-size: clamp(20px, 5vw, 36px);
            margin-bottom: 10px;
        }
        .right-content p {
            font-size: clamp(12px, 3vw, 16px);
            opacity: 0.8;
        }

        .support-text {
            text-align: left;
        }
        .support-text p {
            font-size: clamp(14px, 3vw, 18px);
            line-height: 1.5;
            margin-bottom: 16px;
        }
        @media (max-width: 768px) {
            .right-content header,
            .support-text {
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="flash-overlay" id="flashOverlay"></div>

    <!-- ФОТОАППАРАТ -->
    <div class="camera-wrapper" id="cameraWrapper">
        <div class="camera" id="cameraBtn">
            <img src="../images/camera.png" alt="Фотоаппарат">
        </div>
    </div>

    <div class="hint">нажми на фотик</div>

    <div class="animated-photo-container" id="animatedPhotoContainer"></div>
    <div class="photo-stack" id="photoStack"></div>

    <div class="right-content">
        <a href="../index.html" class="back-btn">← На главную</a>
        <header>
            <h1>Немного добрых слов</h1>
            <p>Все будет круто</p>
        </header>
        <div class="support-text">
            <p>Олимпиады это лишь маленький этап в твоей огромной жизни</p>
            <p>Я верю, что ты со всем справишься</p>
            <p>Просто кайфуй</p>
        </div>
    </div>

    <script src="../script.js"></script>
    <script>
        const images = [
            "1.jpg", "2.jpg", "3.jpg", "4.jpg", "5.jpg",
            "6.jpg", "7.jpg", "8.jpg", "9.jpg", "10.jpg",
            "11.jpg", "12.jpg", "13.jpg", "14.jpg", "15.jpg",
            "16.jpg", "17.jpg", "18.jpg", "19.jpg", "20.jpg"
        ];
        const phrases = [
            "Смотри, какой ты умничка!", "Какая ты хорошая!", "Ты просто прелесть! ",
            "Какая милота!", "Ты самый лучший! ", "Обожаю твою улыбку! ",
            "Ты чудесно выглядишь! ", "Какой ты классный! ", "Ты молодец, правда! ",
            "Хорошо, что ты есть! ", "У тебя отлично получается!", "Ты справляешься, и это круто!",
            "У тебя всё сложится!", "Просто напоминаю: ты можешь!", "Ты стараешься, и это заметно!",
            "Сегодня ты уже сделал(а) многое!", "Ты — приятный человек!", "Ты есть, и это уже победа!",
            "Просто ты есть, и это хорошо!", "Мяу!", "Ты смог(ла) больше, чем кажется!",
            "Ты сделал(а) этот мир лучше!", "Хорошего тебе дня, умница!", "Ты умничка!)",
            "Я в тебя верю!)", "Ты всё сможешь!)", "Ты молодец!)"
        ];

        let isAnimating = false;

        function getRandomImage() {
            return images[Math.floor(Math.random() * images.length)];
        }
        function getRandomPhrase() {
            return phrases[Math.floor(Math.random() * phrases.length)];
        }

        function flashEffect() {
            const flash = document.getElementById('flashOverlay');
            flash.style.opacity = '0.85';
            setTimeout(() => flash.style.opacity = '0', 120);
        }

        function showLastPhoto(imageFile, phrase) {
            const container = document.getElementById('photoStack');
            container.innerHTML = '';

            const photoDiv = document.createElement('div');
            photoDiv.className = 'last-photo';

            const img = document.createElement('img');
            img.src = `../images/animals/${imageFile}`;
            const text = document.createElement('p');
            text.textContent = phrase;

            photoDiv.appendChild(img);
            photoDiv.appendChild(text);
            container.appendChild(photoDiv);
        }

        function animatePhoto(imageFile, phrase) {
            const container = document.getElementById('animatedPhotoContainer');
            container.innerHTML = '';

            const photoDiv = document.createElement('div');
            photoDiv.className = 'anim-photo';

            const img = document.createElement('img');
            img.src = `../images/animals/${imageFile}`;
            const text = document.createElement('p');
            text.textContent = phrase;

            photoDiv.appendChild(img);
            photoDiv.appendChild(text);
            container.appendChild(photoDiv);

            setTimeout(() => photoDiv.classList.add('animate'), 20);

            setTimeout(() => {
                showLastPhoto(imageFile, phrase);
                container.innerHTML = '';
                isAnimating = false;
            }, 1500);
        }

        function takePhoto() {
            if (isAnimating) return;
            isAnimating = true;

            flashEffect();
            const image = getRandomImage();
            const phrase = getRandomPhrase();

            setTimeout(() => animatePhoto(image, phrase), 100);
        }

        const cameraWrapper = document.getElementById('cameraWrapper');
        cameraWrapper.addEventListener('click', (e) => {
            e.stopPropagation();
            takePhoto();
        });
        cameraWrapper.addEventListener('touchstart', (e) => {
            e.stopPropagation();
            takePhoto();
        });

        window.addEventListener('load', () => {
            const firstImage = getRandomImage();
            const img = new Image();
            img.src = `../images/animals/${firstImage}`;
        });
    </script>
</body>
</html>
